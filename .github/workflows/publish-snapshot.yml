name: Publish Snapshot

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: CENTRAL_PORTAL_USERNAME
          server-password: CENTRAL_PORTAL_PASSWORD

      - name: Verify snapshot version
        run: |
          PROJECT_VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "Publishing ${PROJECT_VERSION}"

          if [[ "${PROJECT_VERSION}" != *-SNAPSHOT ]]; then
            echo "Refusing to publish non-snapshot version: ${PROJECT_VERSION}" >&2
            exit 1
          fi

      - name: Publish snapshot to Central Publisher Portal
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
        run: mvn -B -ntp deploy
