name: Perform Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version to prepare, for example 2.4.4
        required: true
        type: string
      development_version:
        description: Next development version, for example 2.4.5-SNAPSHOT
        required: true
        type: string
      tag:
        description: Optional Git tag to create. Defaults to <release_version>
        required: false
        type: string
      dry_run:
        description: Validate release preparation and deployment without pushing commits/tags or deploying artifacts
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: perform-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-and-perform-release:
    runs-on: ubuntu-latest
    env:
      CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
      CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: "11"
          distribution: "temurin"
          cache: maven
          server-id: ossrh
          server-username: CENTRAL_PORTAL_USERNAME
          server-password: CENTRAL_PORTAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Verify publishing credentials
        if: ${{ !inputs.dry_run }}
        run: |
          if [[ -z "${CENTRAL_PORTAL_USERNAME}" || -z "${CENTRAL_PORTAL_PASSWORD}" ]]; then
            echo "Central Portal credentials are not configured for this workflow." >&2
            exit 1
          fi

          if [[ -z "${MAVEN_GPG_PASSPHRASE}" || -z "${{ secrets.MAVEN_GPG_PRIVATE_KEY }}" ]]; then
            echo "Maven GPG private key or passphrase is not configured for this workflow." >&2
            exit 1
          fi

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify release inputs
        run: |
          if [[ "${{ inputs.release_version }}" == *-SNAPSHOT ]]; then
            echo "Release version must not be a SNAPSHOT: ${{ inputs.release_version }}" >&2
            exit 1
          fi

          if [[ "${{ inputs.development_version }}" != *-SNAPSHOT ]]; then
            echo "Development version must end with -SNAPSHOT: ${{ inputs.development_version }}" >&2
            exit 1
          fi

      - name: Verify project version
        run: |
          PROJECT_VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "Preparing release from ${PROJECT_VERSION}"

          if [[ "${PROJECT_VERSION}" != *-SNAPSHOT ]]; then
            echo "Release preparation requires a SNAPSHOT project version, found ${PROJECT_VERSION}" >&2
            exit 1
          fi

      - name: Prepare release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ inputs.tag }}"

          if [[ -z "${RELEASE_TAG}" ]]; then
            RELEASE_TAG="${{ inputs.release_version }}"
          fi

          echo "RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_ENV}"

          EXTRA_ARGS=""

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            EXTRA_ARGS="-DdryRun=true"
          fi

          mvn -B -ntp \
            release:clean release:prepare \
            -DreleaseVersion="${{ inputs.release_version }}" \
            -DdevelopmentVersion="${{ inputs.development_version }}" \
            -Dtag="${RELEASE_TAG}" \
            -Dusername="${GITHUB_ACTOR}" \
            -Dpassword="${GITHUB_TOKEN}" \
            -DscmCommentPrefix="[release] " \
            -Dresume=false \
            ${EXTRA_ARGS}

      - name: Verify prepared tag exists
        if: ${{ !inputs.dry_run }}
        run: |
          git fetch --tags --force

          if ! git rev-parse --verify "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Prepared release tag not found: ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Perform release deployment
        if: ${{ !inputs.dry_run }}
        run: |
          mvn -B -ntp \
            release:perform \
            -Darguments="-Prelease -Dgpg.passphrase=${MAVEN_GPG_PASSPHRASE}" \
            -Dgoals=deploy \
            -Dresume=false \
            ${EXTRA_ARGS}

      - name: Show prepared release summary
        if: ${{ !inputs.dry_run }}
        run: |
          echo "Release version: ${{ inputs.release_version }}"
          echo "Next development version: ${{ inputs.development_version }}"
          echo "Tag: ${RELEASE_TAG}"
          echo "Artifacts were deployed through the Central Publisher Portal compatibility endpoint."
