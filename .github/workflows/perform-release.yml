name: Perform Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag created by the prepare workflow, for example 2.4.4
        required: true
        type: string
      dry_run:
        description: Validate the release perform step without deploying artifacts
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: perform-release-${{ github.ref }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  prepare-and-perform-release:
    runs-on: ubuntu-latest
    env:
      CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
      CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: "11"
          distribution: "temurin"
          cache: maven
          server-id: central
          server-username: CENTRAL_PORTAL_USERNAME
          server-password: CENTRAL_PORTAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Verify publishing credentials
        if: ${{ !inputs.dry_run }}
        run: |
          if [[ -z "${CENTRAL_PORTAL_USERNAME}" || -z "${CENTRAL_PORTAL_PASSWORD}" ]]; then
            echo "Central Portal credentials are not configured for this workflow." >&2
            exit 1
          fi

          if [[ -z "${MAVEN_GPG_PASSPHRASE}" || -z "${{ secrets.MAVEN_GPG_PRIVATE_KEY }}" ]]; then
            echo "Maven GPG private key or passphrase is not configured for this workflow." >&2
            exit 1
          fi

      - name: Verify signing key is published
        if: ${{ !inputs.dry_run }}
        run: |
          SIGNING_KEY_FINGERPRINT="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ { print $10; exit }')"

          if [[ -z "${SIGNING_KEY_FINGERPRINT}" ]]; then
            echo "No signing key fingerprint was found after importing MAVEN_GPG_PRIVATE_KEY." >&2
            exit 1
          fi

          echo "Using signing key fingerprint: ${SIGNING_KEY_FINGERPRINT}"

          TEMP_GNUPG_DIR="$(mktemp -d)"
          chmod 700 "${TEMP_GNUPG_DIR}"

          if ! gpg --batch --homedir "${TEMP_GNUPG_DIR}" --keyserver hkps://keys.openpgp.org --recv-keys "${SIGNING_KEY_FINGERPRINT}" >/dev/null 2>&1; then
            rm -rf "${TEMP_GNUPG_DIR}"
            echo "Could not find the signing key fingerprint on supported public keyservers." >&2
            echo "Upload your public key and retry:" >&2
            echo "gpg --keyserver keys.openpgp.org --send-keys ${SIGNING_KEY_FINGERPRINT}" >&2
            exit 1
          fi

          rm -rf "${TEMP_GNUPG_DIR}"

      - name: Verify release tag exists
        run: |
          git fetch --tags --force

          if ! git rev-parse --verify "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "Release tag not found: ${{ inputs.tag }}" >&2
            exit 1
          fi

      - name: Checkout release tag
        run: |
          git checkout --detach "refs/tags/${{ inputs.tag }}"

      - name: Perform release
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            mvn -B -ntp \
              -Prelease \
              -Dgpg.passphrase="${MAVEN_GPG_PASSPHRASE}" \
              verify
          else
            mvn -B -ntp \
              -Prelease \
              -Dgpg.passphrase="${MAVEN_GPG_PASSPHRASE}" \
              deploy
          fi

      - name: Show performed release summary
        if: ${{ !inputs.dry_run }}
        run: |
          echo "Performed release for tag: ${{ inputs.tag }}"
