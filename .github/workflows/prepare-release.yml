name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version to prepare, for example 2.4.4
        required: true
        type: string
      development_version:
        description: Next development version, for example 2.4.5-SNAPSHOT
        required: true
        type: string
      tag:
        description: Optional Git tag to create. Defaults to <release_version>
        required: false
        type: string
      dry_run:
        description: Validate the release preparation without pushing commits or tags
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: prepare-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify release inputs
        run: |
          if [[ "${{ inputs.release_version }}" == *-SNAPSHOT ]]; then
            echo "Release version must not be a SNAPSHOT: ${{ inputs.release_version }}" >&2
            exit 1
          fi

          if [[ "${{ inputs.development_version }}" != *-SNAPSHOT ]]; then
            echo "Development version must end with -SNAPSHOT: ${{ inputs.development_version }}" >&2
            exit 1
          fi

      - name: Verify project version
        run: |
          PROJECT_VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "Preparing release from ${PROJECT_VERSION}"

          if [[ "${PROJECT_VERSION}" != *-SNAPSHOT ]]; then
            echo "Release preparation requires a SNAPSHOT project version, found ${PROJECT_VERSION}" >&2
            exit 1
          fi

      - name: Prepare release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ inputs.tag }}"

          if [[ -z "${RELEASE_TAG}" ]]; then
            RELEASE_TAG="${{ inputs.release_version }}"
          fi

          echo "RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_ENV}"

          EXTRA_ARGS=""

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            EXTRA_ARGS="-DdryRun=true"
          fi

          mvn -B -ntp \
            release:clean release:prepare \
            -DreleaseVersion="${{ inputs.release_version }}" \
            -DdevelopmentVersion="${{ inputs.development_version }}" \
            -Dtag="${RELEASE_TAG}" \
            -Dusername="${GITHUB_ACTOR}" \
            -Dpassword="${GITHUB_TOKEN}" \
            -DscmCommentPrefix="[release] " \
            -Dresume=false \
            ${EXTRA_ARGS}

      - name: Show prepared release summary
        if: ${{ !inputs.dry_run }}
        run: |
          echo "Release version: ${{ inputs.release_version }}"
          echo "Next development version: ${{ inputs.development_version }}"
          echo "Tag: ${RELEASE_TAG}"
